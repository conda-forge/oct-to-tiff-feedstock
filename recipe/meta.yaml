{% set name = "oct-to-tiff" %}
{% set version = "0.6.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/oct_to_tiff-{{ version }}.tar.gz
  sha256: 28523d8792e7cc9c5668074abb92c8e0378be78f473bca41d8f4ab3e59a2eeb0

build:
  entry_points:
    - oct-to-tiff = oct_to_tiff.cli:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - uv-build >=0.9.26,<0.10.0
    - pip
  run:
    - python >={{ python_min }}
    - defusedxml
    - numpy
    - roifile
    - tifffile

test:
  imports:
    - oct_to_tiff
  commands:
    - pip check
    - oct-to-tiff --help
  requires:
    - pip

about:
  home: https://github.com/camlloyd/oct-to-tiff
  summary: A command line tool for converting optical coherence tomography angiography (OCTA) data.
  license: BSD-3-Clause
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - camlloyd
